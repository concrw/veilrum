name: Bundle Size Guard

on:
  pull_request:
    branches: [main]

jobs:
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build (PR branch)
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 번들 크기 측정 및 임계값 초과 시 실패
      - name: Check bundle size limits
        working-directory: app
        run: |
          echo "=== Bundle Size Report ==="
          du -sh dist/assets/*.js | sort -rh | head -20

          # index.js (메인 번들) 크기 게이트: 200KB 초과 시 경고
          INDEX_SIZE=$(find dist/assets -name "index-*.js" -exec du -k {} \; | awk '{print $1}')
          echo "Main bundle: ${INDEX_SIZE}KB"

          # 전체 JS 합산 크기 게이트: 1.5MB 초과 시 실패
          TOTAL_SIZE=$(find dist/assets -name "*.js" -exec du -k {} \; | awk '{sum+=$1} END {print sum}')
          echo "Total JS size: ${TOTAL_SIZE}KB"

          if [ "$TOTAL_SIZE" -gt 1536 ]; then
            echo "❌ FAIL: 전체 JS 번들 크기 ${TOTAL_SIZE}KB > 한도 1536KB (1.5MB)"
            echo "코드 스플리팅 또는 대형 의존성을 점검하세요."
            exit 1
          else
            echo "✅ PASS: 전체 JS 번들 크기 ${TOTAL_SIZE}KB (한도 1536KB)"
          fi

      # PR에 번들 크기 코멘트
      - name: Comment bundle stats on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // dist 디렉토리의 청크 크기 수집
            let stats;
            try {
              stats = execSync(
                'find app/dist/assets -name "*.js" -exec du -k {} \\; | sort -rn | head -15',
                { encoding: 'utf8' }
              );
            } catch {
              stats = 'Unable to read bundle stats';
            }

            let totalKb;
            try {
              totalKb = execSync(
                'find app/dist/assets -name "*.js" -exec du -k {} \\; | awk \'{sum+=$1} END {print sum}\'',
                { encoding: 'utf8' }
              ).trim();
            } catch {
              totalKb = '?';
            }

            const rows = stats.trim().split('\n').map(line => {
              const [size, path] = line.split('\t');
              const name = path ? path.split('/').pop() : '';
              return `| ${name} | ${size}KB |`;
            });

            const body = [
              '## Bundle Size Report',
              `**Total JS: ${totalKb}KB** (한도: 1536KB)`,
              '',
              '| Chunk | Size |',
              '|-------|------|',
              ...rows,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Lighthouse CI (PWA + 성능 점수) ──────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        working-directory: app
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lhci autorun \
            --collect.staticDistDir=./dist \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance.minScore=0.7 \
            --assert.assertions.categories:accessibility.minScore=0.8 \
            --assert.assertions.categories:best-practices.minScore=0.8 \
            --assert.assertions.categories:seo.minScore=0.7 \
            --upload.target=temporary-public-storage \
          || echo "⚠️ Lighthouse 점수 일부 미달 — 위 리포트 확인 필요"
